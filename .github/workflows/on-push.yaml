on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build dependencies
        run: |
          dotnet build TechnitiumLibrary/TechnitiumLibrary/TechnitiumLibrary.csproj -c Release
          dotnet build TechnitiumLibrary/TechnitiumLibrary.Net/TechnitiumLibrary.Net.csproj -c Release

      - name: Restore NuGet packages
        run: dotnet restore ProxmoxAutodiscoveryApp/ProxmoxAutodiscoveryApp.csproj

      - name: Build ProxmoxAutodiscoveryApp
        run: |
          dotnet build ProxmoxAutodiscoveryApp/ProxmoxAutodiscoveryApp.csproj --no-restore -c Release
